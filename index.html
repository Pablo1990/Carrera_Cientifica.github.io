<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrera Científica: Camino al Nobel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="lang-switcher">
        <button id="lang-es" type="button" class="lang-btn active" aria-pressed="true">ES</button>
        <button id="lang-en" type="button" class="lang-btn" aria-pressed="false">EN</button>
      </div>

      <h1 id="game-title">Carrera Científica: Camino al Nobel</h1>
      <p class="subtitle" id="subtitle">Un juego rápido para entender lo bonito y lo duro de la ciencia.</p>

      <section class="panel" aria-live="polite">
        <h2 id="character-title">Tu personaje</h2>
        <p id="character"></p>
        <p id="stats"></p>
      </section>

      <section class="panel">
        <h2 id="question-title">Empieza tu camino</h2>
        <p id="question">Pulsa en "Comenzar" para recibir tu primera decisión.</p>
        <div id="options" class="options"></div>
      </section>

      <section class="panel" aria-live="polite">
        <h2 id="result-title">Resultado</h2>
        <p id="result">Aquí verás qué pasó con tu decisión.</p>
      </section>

      <section class="panel ending-panel" id="ending-panel" hidden aria-live="polite">
        <h2 id="ending-character-label">Tu homólogo científico</h2>
        <div class="ending-card">
          <img id="ending-photo" class="ending-photo" src="" alt="" hidden />
          <div class="ending-info">
            <h3 id="ending-name"></h3>
            <p id="ending-description"></p>
          </div>
        </div>
      </section>

      <div class="actions">
        <button id="start-btn" type="button">Comenzar</button>
        <button id="restart-btn" type="button" class="secondary" hidden>Jugar otra vez</button>
      </div>
    </main>

    <script type="module" src="game.js"></script>
  </body>
</html>
